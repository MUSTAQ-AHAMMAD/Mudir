# =============================================================================
# .github/workflows/deploy.yml — CI/CD for Mudir / ORCHESTRA.
#
# On push to main:
#   1. Test the backend (Jest) and frontend (Vitest + build).
#   2. Build and push backend + frontend Docker images to GHCR.
#   3. SSH to the production host, pull the new images, run DB migrations,
#      and restart the stack via scripts/deploy.sh.
#
# Required repository secrets:
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY   — SSH access to the server
#   (GHCR uses the built-in GITHUB_TOKEN.)
# =============================================================================
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend — install & test
        working-directory: backend
        run: |
          npm ci
          npm test

      - name: Frontend — install, test & build
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build

  # ---------------------------------------------------------------------------
  build-images:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-images
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/mudir
            git fetch --all --prune
            git checkout main
            git pull --ff-only
            docker compose pull
            # Run database migrations before restarting the app.
            docker compose run --rm backend npm run migrate || true
            # Restart the stack with health checks + rollback (GPU profile).
            ./scripts/deploy.sh gpu
