# =============================================================================
# .github/workflows/test.yml — Python test-suite for Mudir / ORCHESTRA.
#
# Runs the pytest suite (unit + integration + e2e) on every pull request and on
# pushes to main, across Python 3.10 / 3.11 / 3.12. A PostgreSQL service
# container backs the database integration tests; coverage is uploaded as an
# artifact and (best-effort) to Codecov.
# =============================================================================
name: tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    # PostgreSQL for the database integration tests. When these env vars are
    # present the otherwise-skipped tests in tests/integration/test_database.py
    # run against this service.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orchestra
          POSTGRES_PASSWORD: orchestra
          POSTGRES_DB: orchestra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orchestra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DB_USER: orchestra
      TEST_DB_PASS: orchestra
      TEST_DB_HOST: localhost
      TEST_DB_NAME: orchestra_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Compose database URL
        run: |
          echo "ORCHESTRA_TEST_DATABASE_URL=postgresql+asyncpg://${TEST_DB_USER}:${TEST_DB_PASS}@${TEST_DB_HOST}:5432/${TEST_DB_NAME}" >> "$GITHUB_ENV"

      - name: Run test suite with coverage
        run: |
          pytest \
            --cov=orchestra \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=junit.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            junit.xml
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: coverage.xml
          fail_ci_if_error: false
