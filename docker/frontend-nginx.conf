# -----------------------------------------------------------------------------
# docker/frontend-nginx.conf — nginx config baked into the frontend image.
# Serves the compiled SPA, enables gzip, caches hashed static assets, and
# rewrites unknown routes to index.html for client-side routing.
# (This is the per-container config; the edge reverse proxy lives in
#  nginx/nginx.conf.)
# -----------------------------------------------------------------------------
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compress text-based responses.
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    # Long-cache fingerprinted build assets (Vite emits hashed filenames).
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Never cache the HTML entrypoint so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback — all unknown paths resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
