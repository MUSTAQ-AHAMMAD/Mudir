# =============================================================================
# nginx/nginx.conf — edge reverse proxy for Mudir / ORCHESTRA.
#
# Responsibilities:
#   - TLS termination (Let's Encrypt certs from /etc/letsencrypt)
#   - HTTP -> HTTPS redirect (+ ACME http-01 challenge passthrough)
#   - Route /api and /webhook to the backend; everything else to the frontend
#   - Rate limiting on the public webhook
#   - WebSocket upgrade support (real-time dashboard updates)
#   - Security headers + gzip
#   - Load balancing across backend replicas (scale with `--scale backend=N`)
#
# NOTE: replace `example.com` with your real domain before deploying.
# =============================================================================
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;
    server_tokens off;

    # ---- Logging ------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ---- Compression --------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss image/svg+xml;

    # ---- Rate limiting ------------------------------------------------------
    # Protect the public WhatsApp webhook from spam/abuse.
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/s;
    # General API protection.
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ---- WebSocket upgrade map ----------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---- Upstreams (compose DNS resolves replicas round-robin) --------------
    upstream backend_upstream {
        server backend:3000;
        keepalive 32;
    }
    upstream frontend_upstream {
        server frontend:80;
        keepalive 16;
    }

    # ---- HTTP: ACME challenge + redirect to HTTPS ---------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name example.com www.example.com;

        # Cheap, unauthenticated health endpoint for the container healthcheck.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # Let's Encrypt http-01 challenge files.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS: main server -------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name example.com www.example.com;

        # Certificates issued by certbot (see nginx/ssl/README.md).
        ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

        # Modern, secure TLS settings.
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # ---- Security headers ----------------------------------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;

        client_max_body_size 25m;   # allow WhatsApp voice-note media uploads

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # ---- WhatsApp webhook (rate limited) -------------------------------
        location /webhook {
            limit_req zone=webhook burst=20 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- REST API (rate limited, WebSocket-capable) --------------------
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ---- Frontend SPA ---------------------------------------------------
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
