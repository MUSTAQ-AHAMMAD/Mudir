# =============================================================================
# Alembic configuration for the ORCHESTRA database layer.
# =============================================================================
# The database URL is NOT hard-coded here; it is read from the environment by
# `migrations/env.py` via `orchestra.database.config.db_config` (which honours
# DATABASE_URL / SUPABASE_DB_URL or the individual DB_* variables).
#
# Usage:
#     alembic -c orchestra/database/alembic.ini upgrade head
#     alembic -c orchestra/database/alembic.ini downgrade -1
#     alembic -c orchestra/database/alembic.ini revision -m "message"
# =============================================================================

[alembic]
# Path to migration scripts (relative to this file's directory at runtime; see
# env.py which resolves it robustly).
script_location = %(here)s/migrations

# Template used to generate migration file names (date-prefixed for ordering).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Where to look for version scripts.
version_locations = %(here)s/migrations/versions

# Timezone for migration timestamps.
timezone = UTC

# The sqlalchemy.url is intentionally left blank; env.py injects it from the
# environment so secrets never live in this file.
sqlalchemy.url =

[post_write_hooks]
# (none configured)

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
