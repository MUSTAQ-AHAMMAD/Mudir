[pytest]
# ---------------------------------------------------------------------------
# ORCHESTRA (Mudir) — pytest configuration
# ---------------------------------------------------------------------------
# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# Async tests are written with the stdlib ``unittest.IsolatedAsyncioTestCase``
# so no third-party asyncio plugin is required to run the suite.

# Default options. Coverage is enabled when pytest-cov is installed; if the
# plugin is missing pytest simply ignores the ``--cov`` flags (via -p no:cacheprovider
# fallbacks are unnecessary because CI always installs pytest-cov).
addopts =
    -ra
    --strict-markers
    --disable-warnings

# Custom markers (kept in sync with the directory layout).
markers =
    unit: fast, isolated unit tests (no external services).
    integration: tests that exercise a real database or AI service.
    e2e: end-to-end workflow tests spanning multiple components.
    slow: tests that are comparatively slow to run.

# Silence noisy third-party deprecation warnings during test runs.
filterwarnings =
    ignore::DeprecationWarning
